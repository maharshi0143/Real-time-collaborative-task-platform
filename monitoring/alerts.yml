groups:
  - name: taskplatform_alerts
    rules:
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status_code=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx error rate above 5%"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 2 minutes."

      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 response time above 2 seconds"
          description: "P95 latency is {{ $value | humanize }}s for the last 5 minutes."

      - alert: ServiceNotReady
        expr: |
          absent(up{job="backend"}) or up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "The backend service has been unreachable for over 1 minute."
