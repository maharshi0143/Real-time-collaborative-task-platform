name: CD

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Staging URL: ${{ vars.STAGING_URL }}"
          kubectl set image deployment/backend-deployment backend=ghcr.io/${{ github.repository }}-backend:${{ github.sha }} -n taskplatform
          kubectl set image deployment/frontend-deployment frontend=ghcr.io/${{ github.repository }}-frontend:${{ github.sha }} -n taskplatform

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Test health endpoint
        run: |
          curl -f -s ${{ vars.STAGING_URL }}/api/v1/health | grep -q '"status":"ok"'
      - name: Test register endpoint
        run: |
          curl -f -s -X POST ${{ vars.STAGING_URL }}/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"test@smoke.com","username":"smoketest","password":"Smoke@12345"}' | grep -q '"success":true'
      - name: Test login endpoint
        run: |
          RESPONSE=$(curl -f -s -X POST ${{ vars.STAGING_URL }}/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@smoke.com","password":"Smoke@12345"}')
          echo "$RESPONSE" | grep -q '"accessToken"'
      - name: Test authenticated endpoint
        run: |
          TOKEN=$(curl -s -X POST ${{ vars.STAGING_URL }}/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@smoke.com","password":"Smoke@12345"}' | grep -o '"accessToken":"[^"]*"' | cut -d'"' -f4)
          curl -f -s ${{ vars.STAGING_URL }}/api/v1/auth/me \
            -H "Authorization: Bearer $TOKEN" | grep -q '"success":true'

  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          kubectl set image deployment/backend-deployment backend=ghcr.io/${{ github.repository }}-backend:${{ github.sha }} -n taskplatform
          kubectl set image deployment/frontend-deployment frontend=ghcr.io/${{ github.repository }}-frontend:${{ github.sha }} -n taskplatform

  notify:
    needs: deploy-production
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "✅ Production deployment successful!"
          else
            echo "❌ Production deployment failed!"
          fi
