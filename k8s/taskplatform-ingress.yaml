apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskplatform-ingress
  namespace: taskplatform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/websocket-services: "backend-service"
spec:
  tls:
    - hosts:
        - taskplatform.dev
        - api.taskplatform.dev
      secretName: taskplatform-tls
  rules:
    - host: api.taskplatform.dev
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
          - path: /socket
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: 80
    - host: taskplatform.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
